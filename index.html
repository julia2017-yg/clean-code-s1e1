<!DOCTYPE html>

<head>
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet" type="text/css">
  <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
</head>

<body>
  <article class="about">
    <img class="about__img" src="./eisenhower-matrix.jpg" alt="about">
    <a class="about__more" href="https://goal-life.com/page/method/about-eisenhower">Want more details?</a>
  </article>
  <main class="main">
    <section id="add__tasks">
      <label class="add__tasks-input" for="add__tasks-input">Add Item</label>
      <div class="add__tasks-row">
        <input class="task" id="add__tasks-input" type="text">
        <button class="add__tasks-btn">Add</button>
      </div>
    </section>
    <section>
      <h3 class="incomplete__tasks-title">Todo</h3>
      <ul id="incomplete__tasks-list">
        <li class="incomplete__tasks-item">
          <input class="incomplete__tasks-checkbox" type="checkbox">
          <label class="task">Pay Bills</label>
          <input class="text" type="text">
          <button class="edit">Edit</button>
          <button class="delete">
            <img src="./remove.svg" alt="remove icon">
          </button>
        </li>
        <li class="edit__mode">
          <input type="checkbox">
          <label class="task">Go Shopping</label>
          <input type="text" value="Go Shopping" class="task text">
          <button class="edit">Save</button>
          <button class="delete">
            <img src="./remove.svg" alt="remove icon">
          </button>
        </li>
      </ul>
    </section>
    <section>
      <h3>Completed</h3>
      <ul id="completed__tasks">
        <li>
          <input type="checkbox" checked>
          <label class="task">See the Doctor</label>
          <input type="text" class="task text">
          <button class="edit">Edit</button>
          <button class="delete">
            <img src="./remove.svg" alt="remove icon">
          </button>
        </li>
      </ul>
    </section>
  </main>
  <script src="app.js"></script>
</body>

</html>
